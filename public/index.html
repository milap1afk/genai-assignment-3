<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotebookLM RAG Clone</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; background: #f5f5f7; color: #1d1d1f; }
        h1 { text-align: center; color: #1d1d1f; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        input[type="file"], input[type="text"] { width: 100%; padding: 0.5rem; margin-top: 0.5rem; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #007aff; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 1rem; }
        button:hover { background: #005bb5; }
        #chatBox { border: 1px solid #e5e5ea; border-radius: 8px; padding: 1rem; min-height: 200px; max-height: 400px; overflow-y: auto; background: #fafafa; margin-bottom: 1rem; }
        .message { margin-bottom: 1rem; padding: 0.75rem; border-radius: 8px; max-width: 80%; display: inline-block; clear: both; }
        .user-msg { background: #007aff; color: white; float: right; border-bottom-right-radius: 0; }
        .bot-msg { background: #e5e5ea; color: #1d1d1f; float: left; border-bottom-left-radius: 0; }
        .clearfix::after { content: ""; clear: both; display: table; }
        .loader { display: none; color: #888; font-size: 0.9rem; text-align: center; clear: both; }
    </style>
</head>
<body>
    <h1>NotebookLM RAG Clone</h1>
    
    <div class="card">
        <h2>1. Upload Document</h2>
        <form id="uploadForm">
            <div class="form-group">
                <input type="file" id="document" accept=".pdf" required />
            </div>
            <button type="submit" id="uploadBtn">Upload & Index</button>
            <div id="uploadStatus" style="margin-top: 1rem; color: #28a745;"></div>
        </form>
    </div>

    <div class="card">
        <h2>2. Chat with Document</h2>
        <div id="chatBox" class="clearfix"></div>
        <div class="loader" id="chatLoader">Generating answer...</div>
        <form id="chatForm" style="display: flex; gap: 1rem; margin-top: 1rem; clear: both;">
            <input type="text" id="query" placeholder="Ask a question about the document..." required style="flex: 1;" />
            <button type="submit" style="margin-top: 0;">Ask</button>
        </form>
    </div>

    <script>
        let currentDocumentText = "";

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('uploadStatus');
            btn.disabled = true;
            btn.textContent = "Uploading...";
            status.textContent = "";

            const formData = new FormData();
            formData.append('document', document.getElementById('document').files[0]);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (res.ok) {
                    currentDocumentText = data.text;
                    status.textContent = `Success: Document processed and ready for questions!`;
                } else {
                    status.textContent = `Error: ${data.error}`;
                    status.style.color = 'red';
                }
            } catch (err) {
                status.textContent = `Error: ${err.message}`;
                status.style.color = 'red';
            } finally {
                btn.disabled = false;
                btn.textContent = "Upload & Index";
            }
        });

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const queryInput = document.getElementById('query');
            const query = queryInput.value;
            if (!query) return;

            if (!currentDocumentText) {
                alert("Please upload a document first!");
                return;
            }

            addMessage(query, 'user');
            queryInput.value = '';
            document.getElementById('chatLoader').style.display = 'block';

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, documentText: currentDocumentText })
                });
                const data = await res.json();
                
                if (res.ok) {
                    addMessage(data.answer, 'bot');
                } else {
                    addMessage(`Error: ${data.error}`, 'bot');
                }
            } catch (err) {
                addMessage(`Error: ${err.message}`, 'bot');
            } finally {
                document.getElementById('chatLoader').style.display = 'none';
            }
        });

        function addMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `message ${sender === 'user' ? 'user-msg' : 'bot-msg'}`;
            div.textContent = text;
            
            const wrapper = document.createElement('div');
            wrapper.className = 'clearfix';
            wrapper.appendChild(div);
            
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
